# ======= Shadow Dragon — Kitty ======= 

# Font
font_family         JetBrainsMono Nerd Font
bold_font           JetBrainsMono Nerd Font Bold
italic_font         JetBrainsMono Nerd Font Italic
bold_italic_font    JetBrainsMono Nerd Font Bold Italic
font_size           12.5

# Cursor
cursor_shape            beam
cursor_beam_thickness   1.5
cursor_blink_interval   0.5
cursor_stop_blinking_after 15.0

# Scrollback
scrollback_lines 10000

# Window
window_padding_width    14
window_margin_width     0
placement_strategy      center
remember_window_size    yes
initial_window_width    900
initial_window_height   600

# Tabs
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          " {index}: {title} "
active_tab_font_style       bold
inactive_tab_font_style     normal

# Misc
enable_audio_bell       no
visual_bell_duration    0.0
confirm_os_window_close 0
background_opacity      0.92
dynamic_background_opacity yes

# ======= Colors: Shadow Dragon =======

# Background / Foreground
background              #0a0b14
foreground              #e2e8f0
selection_background    #7c3aed
selection_foreground    #e2e8f0
cursor                  #d946ef
cursor_text_color       #0a0b14

# URL
url_color               #7c3aed
url_style               curly

# Tab bar
active_tab_background   #7c3aed
active_tab_foreground   #e2e8f0
inactive_tab_background #1e1b4b
inactive_tab_foreground #94a3b8
tab_bar_background      #0a0b14

# Black
color0  #0f0d1a
color8  #334155

# Red
color1  #f43f5e
color9  #fb7185

# Green
color2  #22c55e
color10 #4ade80

# Yellow
color3  #eab308
color11 #facc15

# Blue
color4  #3b82f6
color12 #60a5fa

# Magenta / Purple
color5  #7c3aed
color13 #d946ef

# Cyan
color6  #06b6d4
color14 #22d3ee

# White
color7  #e2e8f0
color15 #f8fafc

# Keybindings
map ctrl+shift+c    copy_to_clipboard
map ctrl+shift+v    paste_from_clipboard
map ctrl+shift+t    new_tab_with_cwd
map ctrl+shift+w    close_tab
map ctrl+shift+l    next_tab
map ctrl+shift+h    previous_tab
map ctrl+equal      increase_font_size
map ctrl+minus      decrease_font_size
map ctrl+0          restore_font_size
map ctrl+shift+f5   load_config_file