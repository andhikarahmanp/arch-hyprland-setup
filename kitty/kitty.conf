# ======= Your Name (Kimi no Na wa) — Kitty =======

# Font
font_family         JetBrainsMono Nerd Font
bold_font           JetBrainsMono Nerd Font Bold
italic_font         JetBrainsMono Nerd Font Italic
bold_italic_font    JetBrainsMono Nerd Font Bold Italic
font_size           12

# Cursor
cursor_shape            beam
cursor_beam_thickness   1.5
cursor_blink_interval   0.5
cursor_stop_blinking_after 15.0

# Scrollback
scrollback_lines 10000

# Window
window_padding_width    14
window_margin_width     0
placement_strategy      center
remember_window_size    yes
initial_window_width    900
initial_window_height   600

# Tabs
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          " {index}: {title} "
active_tab_font_style       bold
inactive_tab_font_style     normal

# Misc
enable_audio_bell       no
visual_bell_duration    0.0
confirm_os_window_close 0
background_opacity      0.92
dynamic_background_opacity yes

# ======= Colors: Your Name (Kimi no Na wa) =======

# Background / Foreground
background              #050a14
foreground              #e8d5ff
selection_background    #5bbfcf
selection_foreground    #050a14
cursor                  #a78be0
cursor_text_color       #050a14

# URL
url_color               #7de8f0
url_style               curly

# Tab bar
active_tab_background   #5bbfcf
active_tab_foreground   #050a14
inactive_tab_background #0f2744
inactive_tab_foreground #7de8f0
tab_bar_background      #050a14

# Black
color0  #0d1f3c
color8  #1a3a5c

# Red
color1  #c0392b
color9  #e05244

# Green
color2  #22c55e
color10 #4ade80

# Yellow
color3  #eab308
color11 #facc15

# Blue
color4  #2e6e9e
color12 #3a8fc7

# Magenta / Purple
color5  #a78be0
color13 #c5a8f5

# Cyan
color6  #5bbfcf
color14 #7de8f0

# White
color7  #e8d5ff
color15 #f0eaff

# Keybindings
map ctrl+shift+c    copy_to_clipboard
map ctrl+shift+v    paste_from_clipboard
map ctrl+shift+t    new_tab_with_cwd
map ctrl+shift+w    close_tab
map ctrl+shift+l    next_tab
map ctrl+shift+h    previous_tab
map ctrl+equal      increase_font_size
map ctrl+minus      decrease_font_size
map ctrl+0          restore_font_size
map ctrl+shift+f5   load_config_file
